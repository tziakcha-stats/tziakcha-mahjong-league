name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run backend tests
        run: node --test backend/generate/sw-league.test.mjs

      - name: Generate content
        run: node backend/generate/sw-league.mjs
